<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <img src="./images/logo.png" alt="CineWatch Logo">
            <h1>CineWatch</h1>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="theme-img">☀️</button>
            <button id="random" class="random-btn">🎲 RANDOM</button>
            <button class="watchlist-btn" id="watchlist">Watchlist 0</button>
        </div>
    </nav>

    <section class="controls-section">
        <div class="search-box">
            <img src="./images/search.png" alt="Search Icon" class="search-icon">
            <input type="text" id="search-input" placeholder="Search for movies, series...">
        </div>
        <div class="filter-sort-container">
            <div class="filter-container">
                <select id="filter">
                    <option value="all">All Types</option>
                    <option value="movie">Movies</option>
                    <option value="series">Series</option>
                    <option value="episode">Episodes</option>
                </select>
            </div>
            <div class="sort-container">
                <select id="sort">
                    <option value="sort-by">Sort By</option>
                    <option value="newest">Year: Newest First</option>
                    <option value="oldest">Year: Oldest First</option>
                </select>
            </div>
        </div>
    </section>

    <main class="movies-container">
        <div id="movie-grid" class="movie-grid"></div>
        <button id="load-more" class="load-more-btn" style="display: none;">Load More Content</button>
    </main>
    <div class="watchlist-overlay" id="watchlist-overlay"></div>
    <div class="watchlist-sidebar" id="watchlist-sidebar">
        <div class="sidebar-header">
            <h2>My Watchlist</h2>
            <button class="close-sidebar" id="close-sidebar">&times;</button>
        </div>
        <div class="sidebar-content" id="sidebar-content"></div>
    </div>
    
    <div class="movie-modal-overlay" id="movie-modal-overlay">
        <div class="movie-modal" id="movie-modal">
            <button class="close-modal" id="close-modal">&times;</button>
            <div class="modal-content" id="modal-content">
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
